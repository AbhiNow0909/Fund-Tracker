  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

solid rgba(0,0,0,0.06);padding-left:12px\">\n      <div style=\"display:flex;align-items:center;gap:10px;min-width:230px\">\n        <div style=\"width:28px;height:28px;display:flex;align-items:center;justify-content:center\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><rect x=\"2\" y=\"9\" width=\"3.4\" height=\"9\" rx=\"1\" fill=\"#005FB8\"><\u002Frect><rect x=\"7\" y=\"5\" width=\"3.4\" height=\"13\" rx=\"1\" fill=\"#0F7B0F\"><\u002Frect><rect x=\"12\" y=\"2.5\" width=\"3.4\" height=\"15.5\" rx=\"1\" fill=\"#005FB8\"><\u002Frect><\u002Fsvg>\n        <\u002Fdiv>\n        <span style=\"font-size:13px;color:#1a1a1a;font-weight:600;letter-spacing:.01em\">Fund Tracker<\u002Fspan>\n      <\u002Fdiv>\n      <!-- integrated search -->\n      <div style=\"flex:1;display:flex;justify-content:center;padding:0 18px\">\n        <div style=\"width:100%;max-width:480px;height:30px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.75);border:1px solid rgba(0,0,0,0.1);border-radius:5px;padding:0 11px\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"#5e5e5e\" stroke-width=\"1.4\"><circle cx=\"7\" cy=\"7\" r=\"4.3\"><\u002Fcircle><line x1=\"10.4\" y1=\"10.4\" x2=\"14\" y2=\"14\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n          <span style=\"font-size:12.5px;color:#8a8a8a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Search funds, AMCs, categories<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- caption buttons -->\n      <div style=\"display:flex;align-items:stretch;height:48px;min-width:230px;justify-content:flex-end\">\n        <div class=\"cap\" style=\"width:46px;display:flex;align-items:center;justify-content:center;cursor:default;color:#1a1a1a\"><svg width=\"10\" height=\"10\"><line x1=\"0\" y1=\"5\" x2=\"10\" y2=\"5\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n        <div class=\"cap\" style=\"width:46p tTarget && e.currentTarget.textContent) || '';\n      const map = [['Parag Parikh','ppfas'],['PPFAS','ppfas'],['HDFC Mid','hdfcmid'],['Quant Small','quantsmall'],['Mirae','mirae'],['UTI Nifty','uti'],['ICICI','icici'],['SBI Contra','sbicontra'],['Nippon','nippon'],['Motilal','motilal'],['Edelweiss','edelweiss']];\n      for (let i=0;i<map.length;i++){ if (t.indexOf(map[i][0]) !== -1){ id = map[i][1]; break; } }\n    } catch(err){}\n    this.setState({ screen: 'fund', fund: id, portOpen: false });\n    try { const c = document.querySelector('.win-scroll'); if (c) c.scrollTop = 0; } catch(e2){}\n  }\n  setRetView(v){ this.setState({ retView: v }); }\n  setRollWin(w){ this.setState({ rollWin: w }); }\n  setRiskPeriod(p){ this.setState({ riskPeriod: p }); }\n  pillStyle(on){ return on\n    ? { fontSize:'12.5px', color:'#1a1a1a', fontWeight:600, padding:'5px 12px', borderRadius:'4px', background:'#fff', boxShadow:'0 1px 2px rgba(0,0,0,0.08)', cursor:'default' }\n    : { fontSize:'12.5px', color:'#5e5e5e', fontWeight:400, padding:'5px 12px', borderRadius:'4px', cursor:'default' }; }\n  toggleAdd(){ this.setState(st => ({ addOpen: !st.addOpen })); }\n  addCompare(id){ this.setState(st => st.compareIds.indexOf(id) === -1 ? { compareIds: st.compareIds.concat(id), addOpen: false } : { addOpen: false }); }\n  removeCompare(id){ this.setState(st => st.compareIds.length > 2 ? { compareIds: st.compareIds.filter(x => x !== id) } : {}); }\n  openFundById(id){ this.setState({ screen:'fund', fund:id, portOpen:false }); try { const c = document.querySelector('.win-scroll'); if (c) c.scrollTop = 0; } catch(e){} }\n  setRange(r){ this.setState({ range: r, hoverIdx: null }); }\n  setNavRange(r){ this.setState({ navRange: r }); }\n  togglePort(){ this.setState(st => ({ portOpen: !st.portOpen })); }\n  pickPort(mode){ this.setState({ portMode: mode, portOpen: false, screen: 'dashboard' }); try { const c = document.querySelector('.win-scroll'); if (c) c.scrollTop = 0; } catch(e){} }\n  onChartHover(e){\n    try {\n      const r = e.currentTarget.getBoundingClientRect();\n      const ratio = (e.clientX - r.left) / r.width;\n      const counts = {'1W':7,'3M':12,'6M':12,'1Y':12,'3Y':9,'5Y':11,'Max':12};\n      const nn = counts[this.state.range] || 9;\n      let idx = Math.round(ratio * (nn - 1));\n      idx = Math.max(0, Math.min(nn - 1, idx));\n      if (idx !== this.state.hoverIdx) this.setState({ hoverIdx: idx });\n    } catch(err){}\n  }\n  clearHover(){ this.setState({ hoverIdx: null }); }\n  fmtINR(x){ x = Math.round(x); const s = String(x); const l3 = s.slice(-3); let rest = s.slice(0, -3); if (rest) rest = rest.replace(/\\B(?=(\\d{2})+(?!\\d))/g, ','); return '\\u20b9' + (rest ? rest + ',' : '') + l3; }\n  renderVals(){\n    const s = this.state.screen;\n    const ids = ['dashboard','explore','fund','compare','returns','risk','tax','txns','import'];\n    const act = {}, show = {}, h = {};\n    ids.forEach(id => { act[id] = (id===s) ? 'true' : 'false'; h['go_'+id] = ()=>this.go(id); });\n    show[s] = true;\n\n    // ---- Portfolio value chart, range-driven ----\n    const series = {\n      '1W':  { ys:[142,150,137,147,133,128,134], labels:['Fri','Sat','Sun','Mon','Tue','Wed','Thu'], delta:'+0.9%',  up:true, vlo:4180000, vhi:4218500 },\n      '3M':  { ys:[165,156,160,144,150,136,142,128,134,122,116,110], labels:['Mar','Apr','May','Jun'], delta:'+4.2%',  up:true, vlo:4048000, vhi:4218500 },\n      '6M':  { ys:[178,168,172,152,160,146,150,134,128,120,112,104], labels:['Jan','Mar','May','Jun'], delta:'+8.6%',  up:true, vlo:3884000, vhi:4218500 },\n      '1Y':  { ys:[182,168,172,150,158,138,146,126,134,116,106,96],  labels:['Jun 25','Sep','Dec','Mar','Jun 26'], delta:'+16.2%', up:true, vlo:3630000, vhi:4218500 },\n      '3Y':  { ys:[175,150,158,120,128,90,103,66,38],                labels:['Jun 2023','Jun 2024','Jun 2025','Jun 2026'], delta:'+34.3%', up:true, vlo:3140000, vhi:4218500 },\n      '5Y':  { ys:[186,172,166,150,140,118,128,92,78,52,32],         labels:['2021','2023','2025','2026'], delta:'+112%', up:true, vlo:1990000, vhi:4218500 },\n      'Max': { ys:[192,178,172,150,140,116,106,78,64,40,26,16],      labels:['2013','2017','2021','2026'], delta:'+168%', up:true, vlo:1570000, vhi:4218500 },\n    };\n    const order = ['1W','3M','6M','1Y','3Y','5Y','Max'];\n    const cur = series[this.state.range] || series['3Y'];\n    const n = cur.ys.length;\n    const coords = cur.ys.map((y,i)=>[Math.round(i/(n-1)*820), y]);\n    const chartLine = coords.map(c=>c.join(',')).join(' ');\n    const chartArea = 'M' + coords.map(c=>c.join(',')).join(' L') + ' L820,220 L0,220 Z';\n    const axisLabels = cur.labels.map(t=>({ t }));\n    const rangeTabs = order.map(r=>{\n      const on = r===this.state.range;\n      return { label:r, onClick:()=>this.setRange(r),\n        style: on\n          ? { fontSize:'12px', color:'#1a1a1a', fontWeight:600, padding:'4px 11px', borderRadius:'4px', background:'#fff', boxShadow:'0 1px 2px rgba(0,0,0,0.08)', cursor:'default' }\n          : { fontSize:'12px', color:'#5e5e5e', fontWeight:400, padding:'4px 11px', borderRadius:'4px', cursor:'default' } };\n    });\n\n    // ---- hover tooltip (dashboard chart) ----\n    const maxY = Math.max(...cur.ys), minY = Math.min(...cur.ys);\n    const hi = this.state.hoverIdx;\n    const hoverShow = hi !== null && hi >= 0 && hi < n;\n    let hoverLeftPct = '0%', hoverDotTop = '0px', hoverVal = '', hoverLabel = '';\n    if (hoverShow) {\n      const t = (maxY - cur.ys[hi]) / ((maxY - minY) || 1);\n      hoverLeftPct = (hi / (n - 1) * 100).toFixed(2) + '%';\n      hoverDotTop = cur.ys[hi] + 'px';\n      hoverVal = this.fmtINR(cur.vlo + t * (cur.vhi - cur.vlo));\n      hoverLabel = cur.labels[Math.min(cur.labels.length - 1, Math.round(hi / (n - 1) * (cur.labels.length - 1)))];\n    }\n\n    // ---- Fund Detail: NAV vs benchmark, range-driven ----\n    const navSeries = {\n      '1M': { f:[160,150,156,140,148,134,142,128,136], b:[166,160,162,152,156,148,150 '17.8%', max:'26.9%', min:'9.1%',  gt12:'96%', neg:'0%',  label:'5-year' },\n    };\n    const rollCur = rollData[this.state.rollWin] || rollData['3Y'];\n    const rn = rollCur.ys.length;\n    const rollLine = rollCur.ys.map((y,i)=> Math.round(i/(rn-1)*800)+','+y).join(' ');\n    const rollTabs = ['1Y','3Y','5Y'].map(w => ({ label:w, onClick:()=>this.setRollWin(w), style:this.pillStyle(w===this.state.rollWin) }));\n\n    // ---- Risk Metrics: period-driven matrix ----\n    const riskList = [['ppfas','PPFAS Flexi'],['hdfcmid','HDFC Mid-Cap'],['quantsmall','Quant Small'],['mirae','Mirae Large'],['icici','ICICI Bal Adv']];\n    const baseMatrix = {\n      ppfas:[3.2,0.84,1.21,1.74,13.1,-22.4], hdfcmid:[5.4,0.96,1.38,1.92,16.8,-26.4],\n      quantsmall:[2.1,1.18,0.94,1.31,19.4,-31.2], mirae:[1.4,0.99,1.08,1.52,11.9,-18.6], icici:[1.1,0.61,1.32,1.88,8.4,-11.2],\n    };\n    const pf = { '3M':[0.6,1.08,0.72,0.74,1.22,0.78], '6M':[0.75,1.05,0.82,0.84,1.15,0.85], '1Y':[0.9,1.02,0.92,0.93,1.07,0.93], '3Y':[1,1,1,1,1,1], '5Y':[1.1,0.98,1.08,1.07,0.94,1.08] };\n    const dec = [1,2,2,2,1,1];\n    const dir = ['max','min','max','max','min','max'];\n    const per = this.state.riskPeriod;\n    const fac = pf[per] || pf['3Y'];\n    const raw = riskList.map(([id]) => baseMatrix[id].map((v,c)=> v*fac[c]));\n    const colStats = [0,1,2,3,4,5].map(c=>{ const vs = raw.map(r=>r[c]); return { mn:Math.min.apply(null,vs), mx:Math.max.apply(null,vs) }; });\n    const heat = t => t>0.8?'#d6ecdc' : t>0.6?'#e7f3ea' : t>0.45?'#eef6ef' : t>0.3?'#f6efe9' : '#f0d3c6';\n    const riskRows = riskList.map(([id,short],ri)=>{\n      const last = ri === riskList.length-1;\n      const cells = raw[ri].map((v,c)=>{\n        const s = colStats[c]; let t = (s.mx===s.mn) ? 0.5 : (v - s.mn)/(s.mx - s.mn); if (dir[c]==='min') t = 1 - t;\n        const txt = (c===0 ? (v>=0?'+':'') + v.toFixed(dec[c]) : v.toFixed(dec[c]));\n        return { text: txt, style:{ padding:'11px 14px', textAlign:'right', background:heat(t), borderBottom: last?'none':'1px solid rgba(0,0,0,0.04)' } };\n      });\n      return { id, short, onOpen:()=>this.openFundById(id),\n        nameStyle:{ padding:'11px 14px', fontWeight:600, borderBottom: last?'none':'1px solid rgba(0,0,0,0.04)' }, cells };\n    });\n    const riskPeriodTabs = ['3M','6M','1Y','3Y','5Y'].map(p => ({ label:p, onClick:()=>this.setRiskPeriod(p), style:this.pillStyle(p===per) }));\n\n    // ---- portfolio switcher ----\n    const mine = this.state.portMode === 'mine';\n\n    // ---- Compare (dynamic columns) ----\n    const cmpIds = this.state.compareIds;\n    const cmpColors = ['#005FB8','#0f7b0f','#7c3aed','#d97706','#0891b2','#be185d'];\n    const pnum = v => parseFloat(String(v).replace(/[^0-9.\\-]/g, ''));\n    const cmpGrid = { display:'grid', gridTemplateColumns: '1.3fr ' + cmpIds.map(()=>'minmax(96px,1fr)').join(' '), fontVariantNumeric:'tabular-nums', minWidth: (200 + cmpIds.length*120) + 'px' };\n    const cmpCols = cmpIds.map((id,i)=>({\n      id, color: cmpColors[i % cmpColors.length],\n      short: (this.FUNDS[id].name.split(' \\u00b7 ')[0]),\n      onOpen: ()=>this.openFundById(id),\n      removable: cmpIds.length > 2, onRemove: ()=>this.removeCompare(id) }));\n    const metricsDef = [\n      { key:'r5y', label:'5Y CAGR', dir:'max' },\n      { key:'sharpe', label:'Sharpe', dir:'max' },\n      { key:'sortino', label:'Sortino', dir:'max' },\n      { key:'alpha', label:'Alpha', dir:'max' },\n      { key:'beta', label:'Beta', dir:'none' },\n      { key:'std', label:'Std dev', dir:'min' },\n      { key:'expense', label:'Expense ratio', dir:'min' },\n    ];\n    const cmpFunds = cmpIds.map(id => this.FUNDS[id]);\n    const cmpRows = metricsDef.map((m, ri)=>{\n      const vals = cmpFunds.map(f => f[m.key]);\n      const nums = vals.map(pnum);\n      let best = -1;\n      if (m.dir === 'max') best = nums.indexOf(Math.max.apply(null, nums));\n      else if (m.dir === 'min') best = nums.indexOf(Math.min.apply(null, nums));\n      const lastRow = ri === metricsDef.length - 1;\n      const cells = vals.map((v,i)=>({\n        text: v,\n        style: { padding:'11px 18px', fontSize:'13px',\n          borderBottom: lastRow ? 'none' : '1px solid rgba(0,0,0,0.045)',\n          borderLeft:'1px solid rgba(0,0,0,0.05)',\n          color: i===best ? '#1a6a1a' : '#1a1a1a',\n          fontWeight: i===best ? 600 : 400,\n          background: i===best ? '#f1f8f1' : 'transparent' } }));\n      return { label:m.label, cells,\n        labelStyle:{ padding:'11px 18px', fontSize:'13px', color:'#5e5e5e', borderBottom: lastRow ? 'none' : '1px solid rgba(0,0,0,0.045)' } };\n    });\n    const cmpAddable = Object.keys(this.FUNDS).filter(id => cmpIds.indexOf(id) === -1)\n      .map(id => ({ id, name: this.FUNDS[id].name.split(' \\u00b7 ')[0], cat: this.FUNDS[id].sub.split(' \\u00b7 ')[0], onClick: ()=>this.addCompare(id) }));\n    // growth chart lines from each fund's 5Y\n    const cmpLines = cmpIds.map((id,i)=>{\n      const endY = Math.max(20, Math.min(168, 150 - (pnum(this.FUNDS[id].r5y) - 12) * 6));\n      const xs = [0,130,260,390,520,650,780];\n      const pts = xs.map((x,k)=>{ const t=k/(xs.length-1); const base=176+(endY-176)*t; const wob=Math.sin(i*1.3+k*1.05)*5; return x+','+Math.round(base+wob); });\n      return { points: pts.join(' '), color: cmpColors[i % cmpColors.length] };\n    });\n    const cmpLegend = cmpCols.map(c => ({ short:c.short, color:c.color }));\n    const cmpCanAdd = cmpAddable.length > 0;\n\n    return { act, show, ...h,\n      fund: this.FUNDS[this.state.fund] || this.FUNDS.ppfas,\n      openFund: (e)=>this.openFund(e), openTax: ()=>this.go('tax'), openImport: ()=>this.go('import'),\n      openReturns: ()=>this.go('returns'), openRisk: ()=>this.go('risk'), openExplore: ()=>this.go('explore'),\n      chartLine, chartArea, axisLabels, rangeTabs,\n      rangeLabel: this.state.range, rangeDelta: cur.delta, rangeDeltaColor: cur.up ? '#0f7b0f' : '#c42b1c',\n      onChartHover: (e)=>this.onChartHover(e), clearHover: ()=>this.clearHover(),\n      hoverShow, hoverLeftPct, hoverDotTop, hoverVal, hoverLabel,\n      navFundPts, navBenchLine, navFundArea, navTabs, navRangeLabel: this.state.navRange,\n      portName: mine ? 'My portfolio' : 'Sample portfolio',\n      portDesc: mine ? 'no funds yet' : 'demo data',\n      portOpen: this.state.portOpen, onTogglePort: ()=>this.togglePort(),\n      onPickSample: ()=>this.pickPort('sample'), onPickMine: ()=>this.pickPort('mine'),\n      sampleActiveBg: mine ? 'transparent' : '#eaf3fb', mineActiveBg: mine ? '#eaf3fb' : 'transparent',\n      showDashSample: (s==='dashboard' && !mine), showDashEmpty: (s==='dashboard' && mine),\n      cmpGrid, cmpCols, cmpRows, cmpAddable, cmpLines, cmpLegend, cmpCanAdd,\n      addOpen: this.state.addOpen, onToggleAdd: ()=>this.toggleAdd(),\n      retTrailing: retView==='trailing', retRolling: retView==='rolling',\n      retTrailTab, retRollTab, onRetTrail: ()=>this.setRetView('trailing'), onRetRoll: ()=>this.setRetView('rolling'),\n      rollLine, rollTabs, rollWinLabel: rollCur.label, rollAvg: rollCur.avg, rollMax: rollCur.max, rollMin: rollCur.min, rollGt12: rollCur.gt12, rollNeg: rollCur.neg,\n      riskRows, riskPeriodTabs, riskPeriodLabel: per };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
